version: '3'
services:
  # 1. 启动 MySQL 服务 (保持不变)
  mysql:
    image: mysql:5.7
    container_name: cron-mysql
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: "cron-demo"
    ports:
      - "3307:3306"

  # 2. 🚀 [新增] 启动 Redis 服务 (用于时间轮和延迟队列)
  redis:
    image: redis:alpine
    container_name: cron-redis
    ports:
      - "6377:6379"

  # 3. Kafka 服务 (KRaft模式, 保持不变)
  kafka:
    image: apache/kafka:4.2.0
    container_name: cron-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cron-kafka-ui
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - KAFKA_CLUSTERS_0_NAME=local-kraft
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka

  # 4. 业务 Mock 服务 (改造重点)
  mock-services:
    build: .
    container_name: cron-mock
    command: ./mock-bin
    ports:
      - "8877:8877"
    environment:
      - KAFKA_BROKERS=kafka:9092 # 注入 Kafka 地址，让它能发消息
    depends_on:
      - mysql
      - kafka
# 5. 🚀 [Day 2 新增] Timer-Service 延迟调度服务
  timer-service:
    build: .
    container_name: cron-timer
    command: ./timer-bin   # 覆盖 Dockerfile 的默认 CMD，运行时间轮服务
    environment:
      - KAFKA_BROKERS=kafka:9092
      # 注意：在 Docker 网络内部，直接用容器名 redis 加上内部端口 6379 即可
      - REDIS_ADDR=redis:6379  
    depends_on:
      - kafka
      - redis
  # 6. 🚀 [Day 3 新增] Worker 节点 (负责消费超时任务，退库存)
  worker:
    build: .
    command: ./worker-bin
    environment:
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - kafka
      - mysql
    deploy:
      replicas: 3 #启动3个Worker模拟分布式高可用
  alert-service:
    build: .
    container_name: cron-alert
    command: ./alert-bin
    environment:
      - KAFKA_BROKERS=kafka:9092
      - DASHSCOPE_API_KEY=[填写你的APIKEY]
    depends_on:
      - kafka
#启动 Qdrant 向量数据库 (用于存放运维 SOP 和 RAG 知识库)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cron-qdrant
    ports:
      - "6333:6333" # HTTP 端口，方便我们直接调用 API
      - "6334:6334" # gRPC 端口
    
